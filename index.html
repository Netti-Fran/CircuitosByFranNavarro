<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circuito • Fran Navarro</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #121212;
      --text: #ffffff;
      --accent: #00ff9d;
      --fuerza: #c026d3;
    }

    .high-contrast { --bg: #000; --card: #1a1a1a; --text: #fff; --accent: #00ff00; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }

    .title { 
      font-family: 'Barlow Condensed', sans-serif; 
      font-size: 3.4rem; 
      font-weight: 900; 
      letter-spacing: -0.03em; 
      text-align: center; 
      flex: 1; 
    }

    .admin-btn {
      background: #333;
      color: #aaa;
      border: none;
      padding: 10px 18px;
      border-radius: 30px;
      font-size: 1rem;
      cursor: pointer;
    }
    .admin-btn.active { background: #c026d3; color: white; }

    .bloques {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .bloque {
      background: var(--card);
      border-radius: 24px;
      padding: 2.4rem;
      border: 1px solid #222;
    }

    .bloque-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 1.8rem;
    }

    .icon {
      width: 68px;
      height: 68px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .exercise-list {
      font-size: 1.65rem;
      line-height: 2.4;
      font-weight: 500;
    }

    .exercise-list li {
      padding: 14px 0;
      border-bottom: 1px solid #333;
    }

    .register-card {
      background: var(--card);
      border-radius: 20px;
      padding: 2rem;
      margin-top: 3rem;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      background: #1f1f1f;
      border: 1px solid #444;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
    }

    .save-btn {
      background: var(--fuerza);
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    .records {
      margin-top: 1.5rem;
      max-height: 400px;
      overflow-y: auto;
    }

    .record-item {
      background: #1a1a1a;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete-btn {
      background: #e11d48;
      color: white;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .qr-container {
      position: fixed;
      bottom: 30px;
      left: 30px;
      background: rgba(0,0,0,0.8);
      padding: 12px;
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div></div>
    <div class="title">CIRCUITO DE ENTRENAMIENTO</div>
    <div style="display:flex; gap:10px; align-items:center;">
      <button class="admin-btn" id="admin-btn">🔧 Admin</button>
      <button class="btn" id="contrast-btn" title="Alto Contraste">◐</button>
      <button class="btn" id="fullscreen-btn" title="Pantalla Completa">⛶</button>
    </div>
  </div>

  <div class="bloques">
    <!-- Bloque de Fuerza -->
    <div class="bloque fuerza">
      <div class="bloque-header">
        <div class="icon">🏋️</div>
        <div>
          <div style="font-size:1.9rem; font-weight:800; text-transform:uppercase;">Bloque de Fuerza</div>
          <div style="color:#888;">3 personas</div>
        </div>
      </div>
      <div style="background:rgba(192,38,211,0.15); border:2px solid var(--fuerza); padding:1.8rem; border-radius:16px; text-align:center;">
        <strong style="font-size:1.6rem;">Peso Muerto</strong><br>
        <span style="background:var(--fuerza); color:white; padding:8px 24px; border-radius:50px; display:inline-block; margin-top:10px;">85% RM</span>
      </div>
    </div>

    <!-- Bloque Complementos -->
    <div class="bloque complementos">
      <div class="bloque-header">
        <div class="icon">🔄</div>
        <div>
          <div style="font-size:1.9rem; font-weight:800; text-transform:uppercase;">Circuito de Complementos</div>
          <div style="color:#888;">4 personas • Rotación por estaciones</div>
        </div>
      </div>
      <div class="exercise-list">
        <ol>
          <li>Remo unilateral mancuerna</li>
          <li>Airbike</li>
          <li>Push press + Puente glúteo unilateral</li>
          <li>Farmer</li>
        </ol>
      </div>
    </div>

    <div class="bloque core">
