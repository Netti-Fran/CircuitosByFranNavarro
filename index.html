<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circuito • Fran Navarro</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #121212;
      --text: #ffffff;
      --accent: #00ff9d;
      --fuerza: #c026d3;
    }

    .high-contrast { --bg: #000; --card: #1a1a1a; --text: #fff; --accent: #00ff00; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }

    .title { font-family: 'Barlow Condensed', sans-serif; font-size: 3.4rem; font-weight: 900; letter-spacing: -0.03em; text-align: center; flex: 1; }

    .admin-btn {
      background: #333;
      color: #aaa;
      border: none;
      padding: 10px 16px;
      border-radius: 30px;
      font-size: 1rem;
      cursor: pointer;
    }

    .admin-btn.active { background: #c026d3; color: white; }

    .bloques { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2rem; max-width: 1400px; margin: 0 auto; }

    .bloque { background: var(--card); border-radius: 24px; padding: 2.4rem; border: 1px solid #222; }

    .exercise-list { font-size: 1.65rem; line-height: 2.4; font-weight: 500; }
    .exercise-list li { padding: 14px 0; border-bottom: 1px solid #333; }

    .register-card {
      background: var(--card);
      border-radius: 20px;
      padding: 2rem;
      margin-top: 2.5rem;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }

    input { width: 100%; padding: 14px; margin: 8px 0; background: #1f1f1f; border: 1px solid #444; border-radius: 12px; color: white; font-size: 1.1rem; }

    .save-btn {
      background: var(--fuerza);
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    .records { margin-top: 1.5rem; max-height: 400px; overflow-y: auto; }

    .record-item {
      background: #1a1a1a;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete-btn {
      background: #e11d48;
      color: white;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .qr-container {
      position: fixed;
      bottom: 25px;
      left: 25px;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div></div>
    <div class="title">CIRCUITO DE ENTRENAMIENTO</div>
    <div style="display:flex; gap:10px; align-items:center;">
      <button class="admin-btn" id="admin-btn">🔧 Admin</button>
      <button class="btn" id="contrast-btn" title="Alto Contraste">◐</button>
      <button class="btn" id="fullscreen-btn" title="Pantalla Completa">⛶</button>
    </div>
  </div>

  <!-- Bloques del circuito (igual que antes) -->
  <div class="bloques">
    <div class="bloque fuerza"> ... (mismo contenido de bloques anterior) ... </div>
    <div class="bloque complementos"> ... </div>
    <div class="bloque core"> ... </div>
  </div>

  <!-- Registrar Marca -->
  <div class="register-card">
    <h2 style="margin-bottom:1rem; font-size:1.8rem;">📊 Registrar Marca - Peso Muerto</h2>
    <input type="text" id="athlete-name" placeholder="Nombre del atleta" />
    <input type="number" id="weight" placeholder="Peso usado (kg)" />
    <button class="save-btn" onclick="saveRecord()">Guardar Marca</button>

    <h3 style="margin: 1.8rem 0 1rem;">Marcas guardadas:</h3>
    <div class="records" id="records-list"></div>
  </div>

  <!-- QR -->
  <div class="qr-container">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://netti-fran.github.io/TU-REPOSITORIO/" alt="QR">
  </div>

  <script>
    const ADMIN_PASSWORD = "fran123";   // ← Cambia esta contraseña cuando quieras
    let isAdmin = false;

    // Cargar marcas
    function loadRecords() {
      const records = JSON.parse(localStorage.getItem('pm_records') || '[]');
      const list = document.getElementById('records-list');
      
      if (records.length === 0) {
        list.innerHTML = '<p style="color:#666; text-align:center; padding:20px;">Aún no hay marcas guardadas.</p>';
        return;
      }

      list.innerHTML = records.map((r, index) => `
        <div class="record-item">
          <div>
            <strong>${r.name}</strong> — ${r.weight} kg 
            <small style="color:#777;">(${r.date})</small>
          </div>
          ${isAdmin ? `<button class="delete-btn" onclick="deleteRecord(${index})">✕</button>` : ''}
        </div>
      `).join('');
    }

    // Guardar marca
    window.saveRecord = function() {
      const name = document.getElementById('athlete-name').value.trim();
      const weight = document.getElementById('weight').value.trim();

      if (!name || !weight) return alert("Completa nombre y peso");

      const records = JSON.parse(localStorage.getItem('pm_records') || '[]');
      records.unshift({
        name: name,
        weight: parseFloat(weight),
        date: new Date().toLocaleDateString('es-ES')
      });

      localStorage.setItem('pm_records', JSON.stringify(records));
      loadRecords();

      document.getElementById('athlete-name').value = '';
      document.getElementById('weight').value = '';
    };

    // Borrar marca (solo admin)
    window.deleteRecord = function(index) {
      if (!confirm("¿Seguro que quieres borrar esta marca?")) return;
      
      let records = JSON.parse(localStorage.getItem('pm_records') || '[]');
      records.splice(index, 1);
      localStorage.setItem('pm_records', JSON.stringify(records));
      loadRecords();
    };

    // Activar modo Admin
    document.getElementById('admin-btn').addEventListener('click', () => {
      if (isAdmin) {
        isAdmin = false;
        document.getElementById('admin-btn').classList.remove('active');
        alert("Modo Admin desactivado");
      } else {
        const pass = prompt("Introduce la contraseña de administrador:");
        if (pass === ADMIN_PASSWORD) {
          isAdmin = true;
          document.getElementById('admin-btn').classList.add('active');
          alert("✅ Modo Administrador activado");
        } else {
          alert("Contraseña incorrecta");
        }
      }
      loadRecords(); // Actualizar vista
    });

    // Inicializar
    loadRecords();

    // Alto Contraste y Fullscreen (mismo de antes)
    document.getElementById('contrast-btn').addEventListener('click', () => document.body.classList.toggle('high-contrast'));
    
    document.getElementById('fullscreen-btn').addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });
  </script>
</body>
</html>
